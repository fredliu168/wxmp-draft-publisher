<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>微信公众号文章模板</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 677px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            color: #000;
        }
        h2 {
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
            margin-bottom: 15px;
            color: #000;
        }
        p {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: justify;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
            border-radius: 4px;
        }
        .divider {
            border-top: 1px solid #ddd;
            margin: 30px 0;
        }
        blockquote {
            border-left: 4px solid #07c160;
            padding-left: 15px;
            margin: 20px 0;
            color: #666;
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
        }
        .highlight {
            background-color: #fff9e6;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
        ul, ol {
            padding-left: 20px;
            margin-bottom: 15px;
        }
        li {
            margin-bottom: 8px;
        }
        .footer {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <h1>文章标题</h1>

    <p>这里是文章的引言部分...</p>

    <h2>第一部分标题</h2>
    <p>这里是正文内容...</p>

    <img src="https://mmbiz.qpic.cn/..." alt="图片说明" />

    <h2>第二部分标题</h2>
    <p>更多内容...</p>

    <blockquote>
        这里是引用内容
    </blockquote>

    <div class="highlight">
        <strong>重点提示：</strong> 这里是需要强调的内容
    </div>

    <h2>总结</h2>
    <p>文章的总结部分...</p>

    <div class="footer">
        <p>感谢您的阅读！</p>
    </div>
</body>
</html>
